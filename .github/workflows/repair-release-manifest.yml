name: repair-release-manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version, e.g. v0.4.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  update-manifest:
    name: Repair release manifest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          rm -rf dist
          mkdir -p dist
          gh release download "${VERSION}" --repo "${{ github.repository }}" -D dist

      - name: Recreate Goreleaser artifacts metadata
        env:
          VERSION: ${{ inputs.version }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          dist = Path("dist")
          version = os.environ["VERSION"]

          items = []

          for path in sorted(dist.iterdir()):
              name = path.name

              if name.endswith(".minisig") or name == "checksums.txt":
                  continue

              if name.endswith(".tar.gz"):
                  kind = "Archive"
                  base = name[:-7]
              elif name.endswith(".zip"):
                  kind = "Archive"
                  base = name[:-4]
              else:
                  continue

              parts = base.split("_")
              goos = parts[-2]
              goarch = parts[-1]

              binary = "cetus.exe" if goos == "windows" else "cetus"

              items.append({
                  "type": kind,
                  "name": name,
                  "path": str(path),
                  "goos": goos,
                  "goarch": goarch,
                  "goamd64": "v1" if goarch == "amd64" else "",
                  "extra": {
                      "Binary": binary,
                      "Binaries": [binary],
                  },
              })

          with open(dist / "artifacts.json", "w", encoding="utf-8") as f:
              json.dump(items, f, indent=2)
              f.write("\n")

          print(json.dumps(items, indent=2))
          PY

      - name: Select channel
        id: channel
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if printf '%s' "${VERSION}" | grep -Eq -- '-alpha\.'; then
            echo "value=alpha" >> "${GITHUB_OUTPUT}"
          elif printf '%s' "${VERSION}" | grep -Eq -- '-(beta|rc)\.'; then
            echo "value=beta" >> "${GITHUB_OUTPUT}"
          else
            echo "value=stable" >> "${GITHUB_OUTPUT}"
          fi

      - name: Sync signing key files
        env:
          FLEET_MINISIGN_PUBLIC_KEY: ${{ secrets.MINISIGN_PUBLIC_KEY }}
        run: ./scripts/sync-signing-key.sh

      - name: Update manifest metadata
        env:
          FLEET_VERSION: ${{ inputs.version }}
          FLEET_CHANNEL: ${{ steps.channel.outputs.value }}
          FLEET_RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}
          FLEET_REPOSITORY: ${{ github.repository }}
        run: |
          export FLEET_RELEASE_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ./scripts/update-manifest.sh

      - name: Validate generated manifest
        env:
          FLEET_VERSION: ${{ inputs.version }}
          FLEET_REPOSITORY: ${{ github.repository }}
        run: ./scripts/validate-release-manifest.sh

      - name: Commit manifest and installers
        run: |
          git config user.name "cenvero-bot"
          git config user.email "276044322+cenvero-bot@users.noreply.github.com"

          git add public/manifest.json public/signing.pub public/install.sh public/install.ps1 internal/update/signing.pub

          if git diff --cached --quiet; then
            echo "No manifest or installer changes"
            exit 0
          fi

          git commit -m "chore(release): repair manifest for ${{ inputs.version }}"
          git pull --rebase origin main
          git push origin HEAD:main
