name: Repair Cetus Manifest

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version, example: v0.4.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  repair-manifest:
    name: Repair manifest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          rm -rf dist
          mkdir -p dist
          gh release download "${VERSION}" -D dist

      - name: Show downloaded files
        run: |
          find dist -maxdepth 1 -type f | sort

      - name: Update manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          ./scripts/update-manifest.sh "${VERSION}" dist

      - name: Commit manifest
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name cenvero-bot
          git config user.email 276044322+cenvero-bot@users.noreply.github.com

          git add public/manifest.json

          if git diff --cached --quiet; then
            echo "No manifest changes"
            exit 0
          fi

          git commit -m "Update Cetus release manifest for ${VERSION}"

          git pull --rebase origin main
          git push origin HEAD:main
