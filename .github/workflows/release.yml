name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

jobs:
  prepare-assets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - name: Install asset tools
        run: sudo apt-get update && sudo apt-get install -y brotli unzip xz-utils
      - name: Prepare embedded assets
        run: ./scripts/prep-assets.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"
      - name: Package embedded assets
        run: |
          tar -czf "$RUNNER_TEMP/embedded-assets-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            -C internal/assets \
            "${{ matrix.goos }}-${{ matrix.goarch }}"
      - name: Upload embedded assets
        uses: actions/upload-artifact@v4
        with:
          name: embedded-assets-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ runner.temp }}/embedded-assets-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
          retention-days: 1

  goreleaser:
    needs: prepare-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
      - name: Install release tools
        run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Validate release environment
        run: ./scripts/validate-release-env.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
      - name: Write minisign key
        run: |
          install -m 0700 -d "$RUNNER_TEMP/minisign"
          printf '%s\n' "$MINISIGN_PRIVATE_KEY" > "$RUNNER_TEMP/minisign/minisign.key"
          chmod 0600 "$RUNNER_TEMP/minisign/minisign.key"
          echo "MINISIGN_KEY_FILE=$RUNNER_TEMP/minisign/minisign.key" >> "$GITHUB_ENV"
        env:
          MINISIGN_PRIVATE_KEY: ${{ secrets.MINISIGN_PRIVATE_KEY }}
      - name: Download embedded assets
        uses: actions/download-artifact@v4
        with:
          pattern: embedded-assets-*
          path: ${{ runner.temp }}/embedded-assets
          merge-multiple: true
      - name: Restore embedded assets
        run: |
          count=0
          for archive in "$RUNNER_TEMP"/embedded-assets/*.tar.gz; do
            if [ ! -e "$archive" ]; then
              continue
            fi
            tar -xzf "$archive" -C internal/assets
            count=$((count + 1))
          done
          if [ "$count" -ne 4 ]; then
            echo "expected 4 embedded asset archives, got $count" >&2
            exit 1
          fi
      - name: Run GoReleaser for stable release
        if: ${{ !contains(github.ref_name, '-') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
      - name: Run GoReleaser for prerelease
        if: ${{ contains(github.ref_name, '-') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --config .goreleaser.prerelease.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}

  update-manifest:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" -D dist
      - run: ./scripts/update-manifest.sh "${GITHUB_REF_NAME}" dist
      - name: Commit manifest
        run: |
          git config user.name cenvero-bot
          git config user.email 276044322+cenvero-bot@users.noreply.github.com
          git add public/manifest.json
          git commit -m "Update Cetus release manifest for ${GITHUB_REF_NAME}" || exit 0
          git push origin HEAD:main

  smoke-test:
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y minisign
      - name: Download linux archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${GITHUB_REF_NAME}" \
            -p "cetus_${GITHUB_REF_NAME}_linux_amd64.tar.gz" \
            -p "cetus_${GITHUB_REF_NAME}_linux_amd64.tar.gz.minisig"
      - run: minisign -Vm "cetus_${GITHUB_REF_NAME}_linux_amd64.tar.gz" -p public/signing.pub
      - run: tar -xzf "cetus_${GITHUB_REF_NAME}_linux_amd64.tar.gz"
      - run: ./cetus version

  deploy-pages:
    needs:
      - update-manifest
      - smoke-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
