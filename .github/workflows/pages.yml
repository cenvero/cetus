name: Pages

on:
  push:
    branches:
      - main
    paths:
      - public/**
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: github.actor != 'cenvero-bot'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
