<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      background: #030508;
      color: white;
      font-family: sans-serif;
    }
    #title {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 64px;
    }
  </style>
</head>
<body>
  <div id="root"
       data-composition-id="smoke"
       data-width="640"
       data-height="360"
       data-duration="1"
       data-fps="30">
    <h1 id="title" class="clip"
        data-start="0"
        data-duration="1"
        data-track-index="0">
      Cetus
    </h1>
  </div>
</body>
</html>
